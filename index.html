<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visu - Gestão Clara e Eficiente</title>
    <!-- PWA Manifest & Meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fd8b00" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Register Progressive Web App Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Service Worker registration failed:', err);
            });
        });
      }

      // Capture PWA install prompt for React retrieval
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredInstallPrompt = e;
      });

      // Gracefully prevent benign Vite WebSocket connection/closure errors from bubbling as uncaught rejections
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        if (reason && (
          reason === 'WebSocket closed without opened.' ||
          (typeof reason === 'string' && reason.indexOf('WebSocket') !== -1) ||
          (reason.message && reason.message.indexOf('WebSocket') !== -1)
        )) {
          console.warn('[Senior Build Bypass] Filtered benign HMR WebSocket promise rejection:', reason);
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('error', function(event) {
        var msg = event.message || '';
        if (msg && (
          msg.indexOf('WebSocket') !== -1 ||
          msg.indexOf('websocket') !== -1 ||
          msg.indexOf('vite') !== -1
        )) {
          console.warn('[Senior Build Bypass] Filtered benign HMR WebSocket/Vite error event:', msg);
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
